repos:
  - repo: local
    hooks:
      - id: template-sanitization
        name: Check template sanitization
        entry: ./scripts/check-sanitization.sh
        language: system
        pass_filenames: false
        require_serial: true

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

