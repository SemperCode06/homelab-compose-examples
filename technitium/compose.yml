services:
  dns-server:
    image: technitium/dns-server:latest
    hostname: ${DNS_HOSTNAME}
    restart: unless-stopped
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "${DNS_HTTP_PORT}:5380/tcp"
      - "${DNS_HTTPS_PORT}:53443/tcp"
    environment:
      DNS_SERVER_DOMAIN: ${DNS_DOMAIN}
      DNS_SERVER_ADMIN_PASSWORD: ${DNS_ADMIN_PASSWORD}
      DNS_SERVER_RECURSION: AllowOnlyForPrivateNetworks
      DNS_SERVER_ENABLE_BLOCKING: "true"
      DNS_SERVER_FORWARDER_PROTOCOL: Https
      DNS_SERVER_FORWARDERS: ${DNS_FORWARDERS}
      DNS_SERVER_LOG_FOLDER_PATH: /var/log/technitium/dns
      DNS_SERVER_LOG_USING_LOCAL_TIME: "true"
      TZ: ${TZ}
    volumes:
      - config:/etc/dns
      - logs:/var/log/technitium/dns
volumes:
  config:
  logs:

