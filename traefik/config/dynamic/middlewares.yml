http:
  middlewares:
    authentik:
      forwardAuth:
        address: "{{ env `AUTHENTIK_URL` }}/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid

