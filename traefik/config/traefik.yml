global:
  sendAnonymousUsage: false
log:
  level: INFO
api:
  dashboard: true
entryPoints:
  ldaps:
    address: :636
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: :443
    http:
      tls:
        certResolver: cloudflare
certificatesResolvers:
  cloudflare:
    acme:
      storage: /var/traefik/certs/acme.json
      keyType: EC256
      dnsChallenge:
        provider: cloudflare
providers:
  file:
    directory: /etc/traefik/dynamic
    watch: true
